defaults:
  - base_config
  - override data: jamendo_44k
  - override hydra/job_logging: custom
  - _self_

hydra:
  run:
    dir: ./exps/${exp_id}
  output_subdir: train-${now:%Y-%m-%d_%H-%M-%S}-hydra

ema:
  start: 0

mini_train: False
example_train: False
enable_grad_scaler: True
ac_oversample_rate: 5

log_text_interval: 50
log_extra_interval: 10_000
val_interval: 20_000
eval_interval: 20_000
save_eval_interval: 10_000
save_weights_interval: 5_000
save_checkpoint_interval: 10_000
save_copy_iterations: []

batch_size: 64
eval_batch_size: 4

num_iterations: 200_000
learning_rate: 1e-4
linear_warmup_steps: 1_000

lr_schedule: step
lr_schedule_gamma: 0.1

clip_grad_norm: 1.0
weight_decay: 1.0e-6

output_name: null

# Score conditioning flags
use_score: True
use_meanflow: False
use_repa: False

data_dim:
  latent_seq_len: 430
  latent_dim: 40
  text_seq_len: 77
  text_dim: 1024
  text_c_dim: 512

# Score CFG dropout probability
null_score_prob: 0.1

score_tokens:
  seq_len: 1
  projector: mlp
