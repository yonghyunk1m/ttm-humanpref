defaults:
  - base_config
  - override data: jamendo
  - override hydra/job_logging: custom
  - _self_

hydra:
  run:
    dir: ./exps/${exp_id}
  output_subdir: train-${now:%Y-%m-%d_%H-%M-%S}-hydra

data:
  Jamendo_train_npz:
    tag: train
    tsv: data/jamendo_meanaudio_ready/train_44k/npz.tsv
    npz_dir: data/jamendo_meanaudio_ready/train_44k/npz
    output_subdir: null
    repa_npz_dir: null
  Jamendo_val_npz:
    tag: val
    tsv: data/jamendo_meanaudio_ready/val_44k/npz.tsv
    npz_dir: data/jamendo_meanaudio_ready/val_44k/npz
    output_subdir: null
    repa_npz_dir: null
    gt_cache: data/jamendo_meanaudio_ready/val_44k/gt_cache
  Jamendo_test_npz:
    tag: test
    tsv: data/jamendo_meanaudio_ready/test_44k/npz.tsv
    npz_dir: data/jamendo_meanaudio_ready/test_44k/npz
    output_subdir: null
    repa_npz_dir: null
    gt_cache: data/jamendo_meanaudio_ready/test_44k/gt_cache
  latent_mean: sets/latent_mean_44k.pt
  latent_std: sets/latent_std_44k.pt

data_dim:
  latent_seq_len: 430
  text_seq_len: 77
  text_dim: 1024
  text_c_dim: 512
  latent_dim: 40

ema:
  start: 0

mini_train: False
example_train: False
enable_grad_scaler: False
ac_oversample_rate: 5

log_text_interval: 50
log_extra_interval: 10_000
val_interval: 10_000
eval_interval: 20_000
save_eval_interval: 10_000
save_weights_interval: 10_000
save_checkpoint_interval: 20_000
save_copy_iterations: []

batch_size: 8
eval_batch_size: 1

num_iterations: 200_000
learning_rate: 1e-4
linear_warmup_steps: 1_000

lr_schedule: step
lr_schedule_gamma: 0.1

clip_grad_norm: 1.0
weight_decay: 1.0e-6

output_name: null

use_score: True
use_meanflow: False
use_repa: False

null_score_prob: 0.1

score_tokens:
  seq_len: 1
  projector: mlp

vae_44k_ckpt: ./weights/v1-44.pth
